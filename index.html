<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 Purim Tracker</title>
  <meta name="description" content="Purim-only live event listing pulling from the LAJE calendar API with Purim filters + regions." />
  <style>
    :root{
      --bg1:#1a102d;
      --bg2:#2b1748;
      --border: rgba(255,255,255,.14);
      --text: #ffffff;
      --muted: #d3c7ff;
      --gold: #ffd966;
      --good: #3fe38a;
      --warn: #ffcc66;
      --bad: #ff5a7a;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --r: 18px;
    }
    *{ box-sizing:border-box; }
    html,body{overflow-x:hidden; height:100%; }
    body{
      margin:0;
      font-family: -apple-system, BlinkMacSystemFont, ui-sans-serif, system-ui, Segoe UI, Roboto, Helvetica, Arial;
      background: radial-gradient(1100px 750px at 8% -10%, rgba(255,217,102,.12), transparent 60%),
                  radial-gradient(900px 650px at 105% 10%, rgba(211,199,255,.22), transparent 62%),
                  linear-gradient(135deg, var(--bg1), var(--bg2));
      color: var(--text);
      padding-bottom: 26px;
    }
    a{ color: var(--gold); text-decoration:none; }
    a:hover{ text-decoration:underline; }

    header{
      position: relative;
      z-index: 30;
      backdrop-filter: blur(10px);
      background: linear-gradient(to bottom, rgba(26,16,45,.92), rgba(43,23,72,.62));
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .wrap{ max-width: 1100px; margin: 0 auto; padding: 16px 16px 86px; }

    .top{
      max-width:1100px;
      margin:0 auto;
      padding: 18px 16px 10px;
      display:flex;
      gap:12px;
      align-items:flex-end;
      justify-content:space-between;
    }
    .brand{ display:flex; gap:10px; align-items:center; min-width:0; }
    .logo{
      width:40px; height:40px; border-radius: 14px;
      background: linear-gradient(135deg, rgba(255,217,102,.95), rgba(211,199,255,.92));
      color: rgba(26,16,45,.95);
      display:grid; place-items:center;
      font-weight: 950;
      letter-spacing: .5px;
      box-shadow: 0 12px 28px rgba(255,217,102,.16);
      flex: 0 0 auto;
    }
    h1{
      margin:0;
      font-size: 18px;
      letter-spacing: .2px;
      font-weight: 950;
      line-height: 1.15;
    }
    .pills{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      color: var(--muted);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12.5px;
      display:flex; gap:8px; align-items:center;
    }
    .dot{ width:8px; height:8px; border-radius: 999px; background: rgba(211,199,255,.55); }
    .dot.good{ background: var(--good); }
    .dot.warn{ background: var(--warn); }
    .dot.bad{ background: var(--bad); }

    .catWrap{
      max-width:1100px;
      margin: 0 auto;
      padding: 10px 16px 12px;
      display:flex;
      justify-content:center;
    }
    .catGrid{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
    }
    .catBtn{
      appearance:none;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:rgba(255,255,255,.92);
      border-radius:999px;
      padding: 8px 12px;
      font-weight:650;
      letter-spacing:.1px;
      display:flex;
      align-items:center;
      gap:10px;
      min-height:42px;
      cursor:pointer;
      transition:transform .12s ease, box-shadow .2s ease, border-color .2s ease, background .2s ease;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
    }
    .catBtn:hover{ transform:translateY(-1px); border-color:rgba(255,255,255,.22); background:rgba(255,255,255,.08); }
    .catBtn:active{ transform:translateY(0px) scale(.99); }
    .catBtn.active{
      border-color: rgba(255,217,102,.55);
      box-shadow:0 0 0 2px rgba(255,217,102,.18), 0 18px 50px rgba(0,0,0,.35);
      background:linear-gradient(180deg, rgba(255,217,102,.16), rgba(255,255,255,.06));
    }
    .catLeft{ display:flex; align-items:center; gap:10px; font-weight: 900; font-size: 13.5px; }
    .catCount{
      font-size: 12px;
      color: var(--muted);
      border:1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.16);
      padding: 4px 8px;
      border-radius: 999px;
      min-width: 34px;
      text-align:center;
    }

    .panel{
      margin-top: 10px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .controls{
      padding: 14px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }
    .input, select{
      background: rgba(0,0,0,.18);
      border: 1px solid rgba(255,255,255,.14);
      color: var(--text);
      border-radius: 12px;
      padding: 11px 12px;
      font-size: 14px;
      outline: none;
    }
    .input{ flex: 1 1 260px; }
    select{ flex: 0 0 auto; }

    .dateStripWrap{margin:14px 0 0 0}
    .dateStripTitle{font-size:12px;opacity:.75;margin:0 0 8px 2px;letter-spacing:.08em;text-transform:uppercase}
    .dateStrip{
      display:flex;gap:10px;overflow-x:auto;padding:2px 2px 12px 2px;
      scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;
    }
    .dateChip{
      flex:0 0 auto;scroll-snap-align:start;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      color:inherit;border-radius:999px;
      padding:10px 12px;font-weight:600;font-size:13px;white-space:nowrap;
      user-select:none; cursor:pointer;
    }
    .dateChip.active{
      border-color:rgba(99,102,241,.55);
      background:rgba(99,102,241,.18);
      box-shadow:0 0 0 2px rgba(99,102,241,.12) inset;
    }
    .dateStrip::-webkit-scrollbar{height:6px}
    .dateStrip::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:999px}

    .grid{
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
      padding: 14px;
    }
    .card{
      grid-column: span 6;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 18px;
      padding: 14px 14px 12px;
      min-height: 154px;
      display:flex;
      flex-direction:column;
      gap:10px;
      transition: transform .12s ease, border-color .12s ease;
    }
    .card:hover{ transform: translateY(-1px); border-color: rgba(255,217,102,.40); }
    .card h3{ margin:0; font-size: 16px; font-weight: 900; line-height: 1.25; }
    .meta{
      display:flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items:center;
      color: var(--muted);
      font-size: 12.5px;
    }
    .tag{
      padding: 4px 8px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      color: var(--muted);
    }
    .desc{
      color: var(--muted);
      font-size: 13.5px;
      line-height: 1.45;
      margin:0;
      display:-webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow:hidden;
    }
    .row{
      display:flex;
      justify-content: space-between;
      gap:10px;
      align-items:center;
      margin-top:auto;
      padding-top: 2px;
    }
    .links{
      display:flex; gap:10px; align-items:center; flex-wrap:wrap;
      font-size: 13px;
    }
    .links a{
      display:inline-flex; gap:6px; align-items:center;
      padding: 8px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.14);
      text-decoration:none;
      color: var(--text);
      cursor:pointer;
      font: inherit;
    }
    .links a:hover{ border-color: rgba(255,217,102,.40); }
    .small{ font-size: 12px; color: rgba(211,199,255,.72); }

    .state{
      padding: 14px;
      color: var(--muted);
      border-top: 1px solid rgba(255,255,255,.10);
      display:flex;
      gap:10px;
      align-items:flex-start;
      justify-content:space-between;
      flex-wrap:wrap;
    }

    footer{
      text-align:center;
      padding: 26px 16px 22px;
      font-size: 13px;
      color: rgba(211,199,255,.88);
      opacity: .95;
    }

    .floatChip{
      position: fixed;
      left: 14px;
      bottom: 14px;
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(10,14,28,.72);
      backdrop-filter: blur(14px);
      color: rgba(255,255,255,.92);
      font-weight: 650;
      font-size: 13px;
      z-index: 60;
      user-select:none;
      box-shadow: 0 12px 32px rgba(0,0,0,.35);
    }

    @media (max-width: 860px){
      .card{ grid-column: span 12; }
    }
    body{overscroll-behavior-y:none}
  </style>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-FKXSBTRJPN"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-FKXSBTRJPN');
  </script>
</head>
<body>
<header>
  <div class="top">
    <div class="brand">
      <div class="logo">LA</div>
      <div style="min-width:0;">
        <h1>P26 Purim Tracker</h1>
      </div>
    </div>
    <div class="pills">
      <div class="pill"><span class="dot" id="statusDot"></span><span id="statusText">Idle</span></div>
      <div class="pill"><span class="dot good"></span><span><span id="shownCount">0</span> / <span id="totalCount">0</span></span></div>
    </div>
  </div>

  <div class="catWrap">
    <div class="catGrid" id="catGrid"></div>
  </div>
</header>

<div class="wrap">
  <div class="panel">
    <div class="controls">
      <input id="search" class="input" placeholder="Search title, location, description…" />
      <select id="region">
        <option value="all">All LA Regions</option>
        <option value="westside">Westside</option>
        <option value="hollywood">Hollywood</option>
        <option value="weho">WeHo</option>
        <option value="midcity">Pico Robertson</option>
        <option value="dtla">DTLA</option>
        <option value="eastside">Eastside</option>
        <option value="valley">Valley</option>
        <option value="southbay">South Bay</option>
        <option value="pasadena">Pasadena</option>
      </select>
      <select id="sort">
        <option value="best">Sort: Best match</option>
        <option value="start_asc">Sort: Soonest</option>
        <option value="start_desc">Sort: Latest</option>
        <option value="title_asc">Sort: Title A→Z</option>
      </select>
    </div>

    <div class="dateStripWrap">
      <div class="dateStripTitle">Dates</div>
      <div class="dateStrip" id="dateStrip"></div>
    </div>

    <div class="grid" id="grid"></div>

    <div class="state">
      <div style="flex: 1 1 420px;">
        <div class="small">
          Tip: filter by Purim type, region, date, and search.
        </div>
      </div>
    </div>
  </div>

  <footer>(Coded by Andrew - [LA Jewish Events])</footer>
</div>

<div class="floatChip">Coded by Andrew David L</div>

<script>
(() => {
  const API_URL = "https://laje-purim-api.vercel.app/api/events/purim";

  const CATEGORIES = [
    { key:"all", label:"✨ All" },
    { key:"megillah", label:"📖 Megillah" },
    { key:"party", label:"🎭 Party / Masquerade" },
    { key:"seudah", label:"🍷 Seudah / Dinner" },
    { key:"carnival", label:"🎪 Carnival / Festival" },
    { key:"shpiel", label:"🎤 Shpiel / Comedy" },
    { key:"music", label:"🎶 Live Music" },
    { key:"family", label:"👨‍👩‍👧‍👦 Family" },
  ];

  const REGIONS = [
    { key:"westside", label:"Westside", keywords:["westside","santa monica","venice","mar vista","brentwood","palisades","westwood","ucla","culver","sawtelle"] },
    { key:"hollywood", label:"Hollywood", keywords:["hollywood","los feliz","thai town","franklin village"] },
    { key:"weho", label:"WeHo", keywords:["weho","west hollywood","sunset strip","melrose"] },
    { key:"midcity", label:"Pico Robertson", keywords:["pico robertson","pico","robertson","fairfax","miracle mile","la brea","hancock park","mid-city","midcity","mid city"] },
    { key:"dtla", label:"DTLA", keywords:["dtla","downtown","arts district","little tokyo"] },
    { key:"eastside", label:"Eastside", keywords:["eastside","silver lake","echo park","highland park","eagle rock","glassell park"] },
    { key:"valley", label:"Valley", keywords:["valley","sherman oaks","studio city","encino","tarzana","woodland hills","north hollywood","van nuys"] },
    { key:"southbay", label:"South Bay", keywords:["south bay","manhattan beach","hermosa","redondo","el segundo","torrance"] },
    { key:"pasadena", label:"Pasadena", keywords:["pasadena","altadena","san marino"] },
  ];

  const DATE_CHIPS = [
    ["Any", "any"],
    ["Mon, Mar 2", "2026-03-02"],
    ["Tue, Mar 3", "2026-03-03"],
    ["Thu, Mar 5", "2026-03-05"],
    ["Fri, Mar 6", "2026-03-06"],
    ["Sat, Mar 7", "2026-03-07"],
    ["Sun, Mar 8", "2026-03-08"],
  ];

  const els = {
    statusDot: document.getElementById("statusDot"),
    statusText: document.getElementById("statusText"),
    shownCount: document.getElementById("shownCount"),
    totalCount: document.getElementById("totalCount"),
    catGrid: document.getElementById("catGrid"),
    grid: document.getElementById("grid"),
    search: document.getElementById("search"),
    region: document.getElementById("region"),
    sort: document.getElementById("sort"),
    dateStrip: document.getElementById("dateStrip"),
  };

  let rawItems = [];
  let activeCat = "all";
  let activeDate = "any";

  const setStatus = (type, text) => {
    els.statusDot.className = "dot " + (type || "");
    els.statusText.textContent = text;
  };

  const safe = (s) => (s || "").toString();

  const escapeHtml = (str) =>
    String(str ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));

  const parseDate = (v) => {
    if (!v) return null;
    const d = new Date(v);
    return isNaN(d.getTime()) ? null : d;
  };

  const fmt = (d) => d ? d.toLocaleString([], { weekday:"short", month:"short", day:"numeric", hour:"numeric", minute:"2-digit" }) : "";

  const firstUrl = (text) => {
    const t = safe(text);
    const m = t.match(/https?:\/\/[^\s)]+/i);
    return m ? m[0].replace(/[)\].,]+$/,"") : "";
  };

  const isPurimEvent = (title, desc) => {
    const t = (safe(title) + " " + safe(desc)).toLowerCase();
    return t.includes("purim");
  };

  const inferCategory = (ev) => {
    const t = (safe(ev.title) + " " + safe(ev.desc)).toLowerCase();

    const familyTerms = ["carnival","festival","fair","activities"];
    if (familyTerms.some(w => t.includes(w))) return "family";

    if (/(megillah|megilla|reading|esther)/.test(t)) return "megillah";
    if (/(seudah|seuda|dinner|meal|banquet|shabbat)/.test(t)) return "seudah";
    if (/(party|masquerade|club|dj|afterparty|after party|costume|open bar)/.test(t)) return "party";
    if (/(carnival|festival|fair)/.test(t)) return "carnival";
    if (/(shpiel|spiel|comedy|standup|improv)/.test(t)) return "shpiel";
    if (/(live music|band|concert|music|karaoke)/.test(t)) return "music";

    return "all";
  };

  const inferRegion = (ev) => {
    const hay = (safe(ev.location) + " " + safe(ev.title) + " " + safe(ev.desc)).toLowerCase();
    for (const r of REGIONS){
      if (r.keywords.some(k => hay.includes(k))) return r.key;
    }
    return "all";
  };

  const normalize = (item) => {
    const title = item.title ?? item.summary ?? "";
    const desc = item.description ?? item.desc ?? "";
    const location = item.location ?? "";
    const start = item.start?.dateTime ?? item.start?.date ?? item.start ?? item.startTime ?? "";
    const htmlLink = item.htmlLink ?? item.link ?? "";
    const id = item.id ?? (title + "|" + start);

    const ev = {
      id,
      title,
      desc,
      location,
      htmlLink,
      startDate: parseDate(start),
    };

    ev.region = inferRegion(ev);
    ev.cat = inferCategory(ev);

    return ev;
  };

  const buildCats = () => {
    els.catGrid.innerHTML = "";
    for (const c of CATEGORIES){
      const btn = document.createElement("button");
      btn.className = "catBtn" + (c.key === activeCat ? " active" : "");
      btn.dataset.key = c.key;
      btn.innerHTML = `<span class="catLeft">${escapeHtml(c.label)}</span><span class="catCount" id="count_${c.key}">0</span>`;
      btn.addEventListener("click", () => {
        activeCat = c.key;
        [...els.catGrid.querySelectorAll(".catBtn")].forEach(b => b.classList.toggle("active", b.dataset.key === activeCat));
        render();
      });
      els.catGrid.appendChild(btn);
    }
  };

  const buildDates = () => {
    els.dateStrip.innerHTML = "";
    for (const [label, val] of DATE_CHIPS){
      const b = document.createElement("button");
      b.className = "dateChip" + (val === activeDate ? " active" : "");
      b.dataset.date = val;
      b.textContent = label;
      b.addEventListener("click", () => {
        activeDate = val;
        [...els.dateStrip.querySelectorAll(".dateChip")].forEach(x => x.classList.toggle("active", x.dataset.date === activeDate));
        render();
      });
      els.dateStrip.appendChild(b);
    }
  };

  const matchesDate = (ev) => {
    if (activeDate === "any") return true;
    if (!ev.startDate) return false;
    const yyyy = ev.startDate.getFullYear();
    const mm = String(ev.startDate.getMonth()+1).padStart(2,"0");
    const dd = String(ev.startDate.getDate()).padStart(2,"0");
    const key = `${yyyy}-${mm}-${dd}`;
    return key === activeDate;
  };

  const matchesRegion = (ev) => {
    const r = els.region.value || "all";
    if (r === "all") return true;
    return ev.region === r;
  };

  const matchesSearch = (ev) => {
    const q = safe(els.search.value).trim().toLowerCase();
    if (!q) return true;
    const hay = (safe(ev.title) + " " + safe(ev.location) + " " + safe(ev.desc)).toLowerCase();
    return hay.includes(q);
  };

  const scoreBest = (ev) => {
    const q = safe(els.search.value).trim().toLowerCase();
    if (!q) return 0;
    const t = safe(ev.title).toLowerCase();
    const d = safe(ev.desc).toLowerCase();
    const l = safe(ev.location).toLowerCase();
    let s = 0;
    if (t.includes(q)) s += 3;
    if (l.includes(q)) s += 2;
    if (d.includes(q)) s += 1;
    return -s;
  };

  const sortItems = (items) => {
    const mode = els.sort.value || "best";
    const arr = [...items];
    if (mode === "start_asc") arr.sort((a,b) => (a.startDate?.getTime()||0) - (b.startDate?.getTime()||0));
    else if (mode === "start_desc") arr.sort((a,b) => (b.startDate?.getTime()||0) - (a.startDate?.getTime()||0));
    else if (mode === "title_asc") arr.sort((a,b) => safe(a.title).localeCompare(safe(b.title)));
    else arr.sort((a,b) => scoreBest(a) - scoreBest(b) || ((a.startDate?.getTime()||0) - (b.startDate?.getTime()||0)));
    return arr;
  };

  const renderCounts = (items) => {
    const by = Object.create(null);
    for (const c of CATEGORIES) by[c.key] = 0;
    for (const ev of items){
      by.all++;
      if (by[ev.cat] != null) by[ev.cat]++;
    }
    for (const c of CATEGORIES){
      const el = document.getElementById("count_" + c.key);
      if (el) el.textContent = String(by[c.key] || 0);
    }
  };

  const render = () => {
    const purimOnly = rawItems.filter(ev => isPurimEvent(ev.title, ev.desc));
    renderCounts(purimOnly);
    els.totalCount.textContent = String(purimOnly.length);

    const filtered = purimOnly
      .filter(ev => (activeCat === "all" ? true : ev.cat === activeCat))
      .filter(matchesRegion)
      .filter(matchesDate)
      .filter(matchesSearch);

    const sorted = sortItems(filtered);
    els.shownCount.textContent = String(sorted.length);

    if (sorted.length === 0){
      els.grid.innerHTML = `
        <div class="card" style="grid-column: span 12;">
          <h3>No events match your filters.</h3>
          <p class="desc">Try a different Purim button, switch region, or pick another date.</p>
          <div class="links">
            <a href="#" id="clearFilters">Clear filters</a>
            <a href="#" id="resetView">Reset view</a>
            <a href="#" id="searchAgain">Search again</a>
          </div>
        </div>
      `;
      document.getElementById("clearFilters")?.addEventListener("click", (e) => {
        e.preventDefault();
        els.search.value = "";
        els.region.value = "all";
        activeCat = "all";
        activeDate = "any";
        buildCats(); buildDates(); render();
      });
      document.getElementById("resetView")?.addEventListener("click", (e) => {
        e.preventDefault();
        activeCat = "all";
        activeDate = "any";
        buildCats(); buildDates(); render();
      });
      document.getElementById("searchAgain")?.addEventListener("click", (e) => {
        e.preventDefault();
        els.search.focus();
      });
      return;
    }

    els.grid.innerHTML = sorted.map(ev => {
      const when = fmt(ev.startDate);
      const url = ev.htmlLink || firstUrl(ev.desc) || "";
      const desc = safe(ev.desc).replace(/\s+/g," ").trim();
      const regionLabel = REGIONS.find(r=>r.key===ev.region)?.label;
      return `
        <div class="card">
          <h3>${escapeHtml(ev.title || "(Untitled)")}</h3>
          <div class="meta">
            <span class="tag">${escapeHtml(ev.cat === "all" ? "Purim" : ev.cat)}</span>
            ${ev.region !== "all" ? `<span class="tag">${escapeHtml(regionLabel || ev.region)}</span>` : ``}
            ${when ? `<span class="tag">${escapeHtml(when)}</span>` : ``}
            ${ev.location ? `<span class="tag">${escapeHtml(ev.location)}</span>` : ``}
          </div>
          ${desc ? `<p class="desc">${escapeHtml(desc)}</p>` : ``}
          <div class="row">
            <div class="links">
              ${url ? `<a href="${escapeHtml(url)}" target="_blank" rel="noopener">Open</a>` : ``}
            </div>
            <div class="small"></div>
          </div>
        </div>
      `;
    }).join("");
  };

  const fetchEvents = async () => {
    setStatus("warn", "Loading…");
    try{
      const res = await fetch(API_URL, { cache: "no-store" });
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();

      const items = Array.isArray(data) ? data
                  : Array.isArray(data.items) ? data.items
                  : Array.isArray(data.events) ? data.events
                  : [];

      rawItems = items.map(normalize);
      setStatus("good", "Live");
      render();
    }catch(err){
      console.error(err);
      rawItems = [];
      setStatus("bad", "Network error");
      render();
    }
  };

  buildCats();
  buildDates();

  els.search.addEventListener("input", () => render());
  els.region.addEventListener("change", () => render());
  els.sort.addEventListener("change", () => render());

  fetchEvents();

  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) fetchEvents();
  });
})();
</script>
</body>
</html>
